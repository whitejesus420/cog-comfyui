name: Push to Replicate

# Manual cog-push for the vault tavern fork. Bakes the Civitai token into
# custom_node_helpers/Civitai.py at build time so the public repo stays clean,
# then pushes the image to r8.im/whitejesus420/cog-comfyui. Requires three
# repo secrets:
#   COG_TOKEN           — CLI auth token from https://replicate.com/auth/token,
#                         needed to authenticate against the r8.im Docker
#                         registry. The regular r8_... API token does NOT work
#                         for registry push (confirmed on cog 0.20.0).
#   REPLICATE_API_TOKEN — r8_... API token, also needed by cog push for the
#                         metadata/version-create API call.
#   CIVITAI_TOKEN       — baked into custom_node_helpers/Civitai.py at build
#                         time so Civitai weight downloads work in the image.

on:
  workflow_dispatch:
    inputs:
      cog_version:
        description: 'Cog version (e.g. latest, v0.14.11)'
        type: string
        default: 'latest'

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Cog
        run: |
          if [ "${{ inputs.cog_version }}" = "latest" ]; then
            sudo curl -o /usr/local/bin/cog -L "https://github.com/replicate/cog/releases/latest/download/cog_$(uname -s)_$(uname -m)"
          else
            sudo curl -o /usr/local/bin/cog -L "https://github.com/replicate/cog/releases/download/${{ inputs.cog_version }}/cog_$(uname -s)_$(uname -m)"
          fi
          sudo chmod +x /usr/local/bin/cog

      - name: Install custom nodes
        run: |
          python ./scripts/install_custom_nodes.py

      - name: Bake Civitai token into helper
        env:
          CIVITAI_TOKEN: ${{ secrets.CIVITAI_TOKEN }}
        run: |
          if [ -z "$CIVITAI_TOKEN" ]; then
            echo "::error::CIVITAI_TOKEN secret is not set" >&2
            exit 1
          fi
          # `|` delimiter avoids needing to escape slashes; token is hex/base64
          # so won't contain `|`.
          sed -i "s|__CIVITAI_TOKEN__|${CIVITAI_TOKEN}|g" custom_node_helpers/Civitai.py
          if grep -q "__CIVITAI_TOKEN__" custom_node_helpers/Civitai.py; then
            echo "::error::Token substitution did not replace the placeholder" >&2
            exit 1
          fi
          echo "Token substituted into custom_node_helpers/Civitai.py"

      - name: Cog login to r8.im registry
        env:
          COG_TOKEN: ${{ secrets.COG_TOKEN }}
        run: |
          if [ -z "$COG_TOKEN" ]; then
            echo "::error::COG_TOKEN secret is not set (fetch from https://replicate.com/auth/token)" >&2
            exit 1
          fi
          echo "$COG_TOKEN" | cog login --token-stdin

      - name: Push to Replicate
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          if [ -z "$REPLICATE_API_TOKEN" ]; then
            echo "::error::REPLICATE_API_TOKEN secret is not set" >&2
            exit 1
          fi
          cog push r8.im/whitejesus420/cog-comfyui
